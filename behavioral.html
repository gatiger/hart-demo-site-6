<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Behavioral Health | Hart County</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/behavioral.css" />

  <script defer src="/js/alerts.js"></script>
  <script defer src="/js/app.js"></script>
  <script defer src="/js/behavioral.js"></script>
</head>

<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <header class="topbar">
    <div class="navRow">
      <a class="brand brandLink" href="index.html">
        <div class="seal">
          <img src="/assets/hart_seal.svg" alt="Hart County, Georgia official seal">
        </div>
        <div class="brandText">
          <div class="kicker">Hart County, Georgia</div>
          <div class="title">Behavioral Health</div>
        </div>
      </a>

      <nav class="topNav" aria-label="Primary">
        <a href="directory.html">Directory</a>
        <a href="commissioners.html">Commissioners</a>
        <a href="employment.html">Employment</a>
        <a href="about.html">About</a>
        <a href="paynes-creek.html">Paynes Creek</a>
        <a href="news.html">News</a>
        <a href="meetings.html">Meetings</a>
        <a href="behavioral.html" aria-current="page">Behavioral Health</a>
        <a href="accessibility.html">Accessibility</a>
      </nav>

      <button class="btn menuBtn" id="menuBtn">Menu</button>
    </div>
  </header>

  <main id="main" class="container behavioralPage" tabindex="-1">

    <section class="behavioralTopGrid">
      <!-- PHOTO -->
      <article class="card behavioralPhotoCard">
        <div class="behavioralPhotoWrap">
          <img
            id="behavioralPhoto"
            class="behavioralPhoto"
            src="/assets/placeholder.jpg"
            alt="Behavioral Health Center building">
        </div>
        <div class="behavioralPhotoText" id="behavioralPhotoText"></div>
      </article>

      <!-- INFO -->
      <article class="card behavioralInfoCard">
        <p class="behavioralEyebrow" id="behavioralEyebrow"></p>
        <h1 class="behavioralPageTitle" id="behavioralPageTitle">Behavioral Health</h1>

        <div class="behavioralInfoBlock">
          <p class="behavioralName" id="behavioralName"></p>
          <p class="behavioralRole" id="behavioralRole"></p>
        </div>

        <div class="behavioralDetails">
          <p id="behavioralOfficeRow" hidden></p>
          <p id="behavioralAddressRow" hidden></p>
          <p id="behavioralPhoneRow" hidden></p>
          <p id="behavioralEmailRow" hidden></p>
          <p id="behavioralHoursRow" hidden></p>
        </div>
      </article>
    </section>

    <!-- MESSAGE -->
    <section class="card behavioralMessageCard">
      <h2 id="behavioralMessageTitle" class="sectionTitle"></h2>
      <div
        id="behavioralMessageBody"
        class="behavioralMessageBody"
        aria-live="polite"></div>
    </section>

    <footer class="footer">
      <div>© 2026 Hart County Board of Commissioners</div>
    </footer>

  </main>
</body>
</html>
