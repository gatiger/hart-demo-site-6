<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Descriptions | Hart County Employee Portal</title>

  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="../css/portal_base.css" />
  <link rel="stylesheet" href="../css/portal_jobs_descriptions.css" />

  <script defer src="../js/portal_app.js"></script>
  <script defer src="../js/portal_jobs_descriptions.js"></script>
</head>
<body>
  <div class="sealBar">
    <a href="../index.html" class="sealLink" aria-label="Go to homepage">
      <img src="../assets/hart_seal.svg" alt="Hart County, Georgia official seal">
    </a>
  </div>

  <nav class="portalNav" aria-label="Employee portal sections">
    <a href="portal_directory.html" class="portalBtn">Employee Directory</a>
    <a href="portal_job_descriptions.html" class="portalBtn active" aria-current="page">Job Descriptions</a>
    <a href="portal_employee_policies.html" class="portalBtn">Employee Policies</a>
    <a href="portal_employee_forms.html" class="portalBtn">Forms</a>
    <a href="portal_county_policies.html" class="portalBtn">Countywide Policies</a>
  </nav>

  <a class="skip-link" href="#main">Skip to main content</a>

  <main id="main" class="container" tabindex="-1">
    <section class="jobDescLayout">
      <aside class="jobDescSidebar">
        <h2 class="jobDescSidebarTitle">Positions</h2>
        <div
          id="jobDescList"
          class="jobDescList"
          role="listbox"
          aria-label="Job descriptions">
        </div>
      </aside>

      <section class="jobDescPanel" aria-live="polite">
        <div id="jobDescEmpty" class="jobDescEmpty">
          Select a job title from the left to view its description.
        </div>

        <article id="jobDescContent" class="jobDescContent" hidden>
          <h2 id="jobDescTitle"></h2>
          <div id="jobDescMeta" class="jobDescMeta"></div>
          <div id="jobDescBody" class="jobDescBody"></div>

          <button id="backToTopBtn" class="portalBtn portalBtnSmall" type="button">
            Back to Top
          </button>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
