<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Administration | Hart County</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Quintessential&family=Felipa&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">

  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/administration.css" />

  <script defer src="/js/alerts.js"></script>
  <script defer src="/js/app.js"></script>
  <script defer src="/js/administration.js"></script>
</head>

<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <header class="topbar">
    <div class="navRow">
      <a class="brand brandLink" href="index.html">
        <div class="seal">
          <img src="/assets/hart_seal.svg" alt="Hart County, Georgia official seal">
        </div>
        <div class="brandText">
          <div class="kicker">Hart County</div>
          <div class="title">Administration</div>
        </div>
      </a>

      <nav class="topNav" aria-label="Primary">
        <a href="directory.html">Directory</a>
        <a href="commissioners.html">Commissioners</a>
        <a href="employment.html">Employment</a>
        <a href="about.html">About</a>
        <a href="paynes_creek.html">Paynes Creek</a>
        <a href="news.html">News</a>
        <a href="meetings.html">Meetings</a>
        <a href="accessibility.html">Accessibility</a>
      </nav>

      <button
        class="btn menuBtn"
        type="button"
        id="menuBtn"
        aria-controls="mobileMenu"
        aria-expanded="false">
        Menu
      </button>
    </div>
  </header>

  <div class="menuBackdrop" id="menuBackdrop" hidden></div>

  <aside
    class="menuPanel"
    id="mobileMenu"
    hidden
    aria-label="Mobile navigation">
    <div class="menuPanelHead">
      <div class="menuPanelTitle">Menu</div>
      <button class="btn ghost" type="button" id="menuClose" aria-label="Close menu">Close</button>
    </div>

    <nav class="menuNav" aria-label="Primary mobile">
      <a href="directory.html">Directory</a>
      <a href="commissioners.html">Commissioners</a>
      <a href="employment.html">Employment</a>
      <a href="about.html">About</a>
      <a href="paynes_creek.html">Paynes Creek</a>
      <hr>
      <a href="news.html">News</a>
      <a href="meetings.html">Meetings</a>
      <a href="accessibility.html">Accessibility</a>
    </nav>
  </aside>

  <main id="main" class="container administrationPage" tabindex="-1">
    <section class="adminTopGrid" aria-label="Administration overview">
      <article class="card adminPhotoCard" aria-labelledby="adminPhotoCaption">
        <div class="adminPhotoWrap">
          <img
            id="adminPhoto"
            class="adminPhoto"
            src="/assets/admin-placeholder.jpg"
            alt="Hart County Administration Building">
        </div>

        <div class="adminPhotoText" id="adminPhotoText">
          <p id="adminPhotoCaption"></p>
        </div>
      </article>

      <article class="card adminInfoCard" aria-labelledby="adminPageTitle">
        <p class="adminEyebrow" id="adminEyebrow"></p>
        <h1 class="adminPageTitle" id="adminPageTitle">Administration</h1>

        <div class="adminInfoBlock">
          <p class="adminName" id="adminName"></p>
          <p class="adminRole" id="adminRole"></p>
        </div>

        <div class="adminDetails" aria-label="Administrator contact information">
          <p id="adminOfficeRow" hidden></p>
          <p id="adminAddressRow" hidden></p>
          <p id="adminPhoneRow" hidden></p>
          <p id="adminEmailRow" hidden></p>
          <p id="adminHoursRow" hidden></p>
        </div>
      </article>
    </section>

    <section class="card adminShortMessageCard" aria-labelledby="adminShortMessageTitle">
      <h2 id="adminShortMessageTitle" class="sectionTitle"></h2>
      <div
        class="adminShortMessageBody"
        id="adminShortMessageBody"
        aria-live="polite"></div>
    </section>

    <section class="card adminMessageCard" aria-labelledby="adminMessageTitle">
      <h2 id="adminMessageTitle" class="sectionTitle"></h2>

      <div
        class="adminMessageBody"
        id="adminMessageBody"
        aria-live="polite"></div>

      <div class="orgChartBlock" id="orgChartBlock" hidden>
        <h3 class="orgChartTitle" id="orgChartTitle"></h3>
        <p class="orgChartText">
          <a id="orgChartLink" href="" target="_blank" rel="noopener"></a>
        </p>
      </div>
    </section>

    <footer class="footer">
      <div>© 2026 Hart County Board of Commissioners</div>
    </footer>
  </main>
</body>
</html>
